# =============================================================================
# docker/nginx/default.conf — Nginx sert le front Laravel, passe PHP à php-fpm
# Ce fichier est monté dans le conteneur nginx (voir docker-compose.yml)
# =============================================================================

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Logs vers stdout/stderr pour docker logs
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Taille max des uploads (formulaires Laravel)
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Passe les requêtes PHP au service php-fpm (résolu par Docker DNS)
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Timeouts généreux (migrations, etc.)
        fastcgi_read_timeout 300;
    }

    # Refuse l'accès aux fichiers .htaccess
    location ~ /\.ht {
        deny all;
    }

    # Cache navigateur sur les assets compilés par Vite (noms hashés)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
